<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background-color: #ffffff; }
        .header { text-align: center; font-weight: bold; font-size: 20px; margin: 20px 0; color: #333; }
        
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 18px; color: #aaa; font-size: 18px; }
        
        input { 
            width: 100%; padding: 18px 18px 18px 45px; 
            background-color: #f9f9f9; border: none; 
            border-radius: 12px; font-size: 16px; box-sizing: border-box; color: #888;
        }

        button { 
            width: 100%; padding: 18px; background-color: #777; 
            color: #fff; border: none; border-radius: 10px; 
            font-size: 18px; font-weight: bold; margin-top: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">LOG IN</div>

    <div class="input-group">
        <i class="fas fa-phone"></i>
        <input type="text" id="mobile" placeholder="Enter Your Phone Number">
    </div>
    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="pass" placeholder="Enter Password">
    </div>
    
    <button type="button" onclick="login()">LOG IN</button>

    <script src="auth.js"></script>
    <script>
        // ओरिजिनल लॉजिक
        if (isSessionValid()) { window.location.href = 'dashboard.html'; }

        async function login() {
            const mobile = document.getElementById('mobile').value.trim();
            const pass = document.getElementById('pass').value;

            if (!mobile || !pass) {
                alert('Please enter both mobile number and password');
                return;
            }

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile, pass })
                });

                const data = await response.json();

                if (data.success) {
                    saveAuth(data);
                    alert('Login successful!');
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.message || 'Invalid mobile number or password.');
                }
            } catch (err) {
                console.error(err);
                alert('Server connection error. Please try again later.');
            }
        }
    </script>
</body>
</html>
