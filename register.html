<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Register</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background-color: #ffffff; }
        .header { text-align: center; font-weight: bold; font-size: 20px; margin: 20px 0; color: #333; }
        
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 18px; color: #aaa; font-size: 18px; }
        
        input { 
            width: 100%; padding: 18px 18px 18px 45px; 
            background-color: #f9f9f9; border: none; 
            border-radius: 12px; font-size: 16px; box-sizing: border-box; color: #888;
        }

        button { 
            width: 100%; padding: 18px; background-color: #777; 
            color: #fff; border: none; border-radius: 10px; 
            font-size: 18px; font-weight: bold; margin-top: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">Register</div>

    <!-- ओरिजिनल लॉजिक और आईडी के साथ इनपुट -->
    <div class="input-group">
        <i class="fas fa-phone"></i>
        <input type="text" id="mobile" placeholder="Phone">
    </div>
    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="pass" placeholder="Enter Password">
    </div>
    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="confirmPass" placeholder="Repeat Password">
    </div>
    <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="text" id="referral" placeholder="Oeahoyopbkbe" readonly>
    </div>
    
    <button type="button" onclick="register()">Register</button>

    <script src="auth.js"></script>
    <script>
        // ओरिजिनल लॉजिक
        if (isSessionValid()) { window.location.href = 'dashboard.html'; }

        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        window.onload = function() { document.getElementById('referral').value = code || 'NONE'; };

        async function register() {
            const mobile = document.getElementById('mobile').value.trim();
            const pass = document.getElementById('pass').value;
            const confirmPass = document.getElementById('confirmPass').value;
            const referral = document.getElementById('referral').value;

            if (!/^\d{10}$/.test(mobile)) { alert('Please enter a valid 10-digit mobile number'); return; }
            if (pass.length < 6) { alert('Password must be at least 6 characters.'); return; }
            if (pass !== confirmPass) { alert('Passwords do not match'); return; }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile, pass, referral })
                });
                const data = await response.json();
                if (data.success) {
                    saveAuth(data);
                    alert('Registration successful!\nYour unique ID: ' + data.userID);
                    window.location.href = 'https://www.webtonative.com/api/v1/demo/download/6a55670e2e0cc4fc6f4e9e7a/ANDROID?t=1784066724495';
                } else {
                    alert(data.message || 'Registration failed.');
                }
            } catch (err) { alert('Server connection error.'); }
        }
    </script>
</body>
</html>
