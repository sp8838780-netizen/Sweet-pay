<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Token History</title>
    <style>
        /* मोबाइल पर स्क्रीन फिक्स रखने के लिए CSS */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background: #f9f9f9; 
            font-family: sans-serif; 
            padding-bottom: 20px;
            touch-action: manipulation;
        }
        .header { background: #fff; padding: 15px; font-weight: bold; border-bottom: 1px solid #eee; display: flex; align-items: center; cursor: pointer; }
        .type-select { margin: 15px; }
        .type-btn { background: #eee; padding: 8px 15px; border-radius: 5px; cursor: pointer; border: none; font-size: 14px; }
        .token-card { background: #fff; margin: 10px 15px; padding: 15px; border-radius: 10px; border-bottom: 1px solid #eee; }
        .token-title { color: #00bfa5; font-weight: bold; margin-bottom: 10px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        .label { color: #888; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: #fff; margin: 20% auto; padding: 20px; width: 80%; border-radius: 15px; }
        .modal-content div { padding: 12px 0; border-bottom: 1px solid #eee; cursor: pointer; }
    </style>
</head>
<body>
    <script>
        document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
    </script>

    <div class="header" onclick="window.location.href='dashboard.html'">&lt; Token History</div>
    
    <div class="type-select">
        <button class="type-btn" onclick="toggleModal()">Type ▾</button>
    </div>

    <div id="tokenList"></div>

    <div id="filterModal" class="modal" onclick="toggleModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>Type</h3>
            <div onclick="filterData('All')">All</div>
            <div onclick="filterData('Recharge')">Recharge</div>
            <div onclick="filterData('Reward')">Reward</div>
            <div onclick="filterData('Activity Reward')">Activity Reward</div>
            <div onclick="filterData('Commission')">Commission</div>
            <div onclick="filterData('Receive')">Receive</div>
            <div onclick="filterData('Return')">Return</div>
        </div>
    </div>

    <script>
        let tokenData = [];

        function toggleModal() {
            const modal = document.getElementById('filterModal');
            modal.style.display = (modal.style.display === 'block') ? 'none' : 'block';
        }

        async function loadTokenHistory() {
            try {
                const res = await fetch('/api/token-history', { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') } });
                const data = await res.json();
                tokenData = data.history || [];
                filterData('All');

                // SSE for live updates
                try {
                    const token = encodeURIComponent(localStorage.getItem('token') || '');
                    const es = new EventSource('/api/stream?token=' + token);
                    es.onmessage = (e) => {
                        try {
                            const msg = JSON.parse(e.data || '{}');
                            if (msg.type === 'payment_update' && msg.payment) {
                                const p = msg.payment;
                                const entry = {
                                    type: (p.status === 'SUCCESS') ? 'Recharge' : (p.status === 'PENDING_APPROVAL' ? 'Pending' : p.status),
                                    amount: String(p.amount || ''),
                                    utr: p.utr,
                                    desc: `${p.requestID} ${p.status}`,
                                    time: p.createdAt
                                };
                                tokenData.unshift(entry);
                                filterData('All');
                            }
                        } catch (err) { console.error('SSE token parse', err); }
                    };
                } catch (err) { console.warn('Live updates unavailable', err); }
            } catch (err) {
                console.error(err);
            }
        }

        function filterData(type) {
            const list = document.getElementById('tokenList');
            list.innerHTML = "";
            toggleModal();

            const filtered = (type === 'All') ? tokenData : tokenData.filter(t => t.type === type);

            filtered.forEach(t => {
                list.innerHTML += `
                    <div class="token-card">
                        <div class="token-title">inr${t.type}Agent</div>
                        <div class="row"><span class="label">Amount</span> <span>${t.amount}</span></div>
                        <div class="row"><span class="label">UTR</span> <span>${t.utr || ''}</span></div>
                        <div class="row"><span class="label">Desc</span> <span style="font-size: 12px;">${t.desc}</span></div>
                        <div class="row"><span class="label">Time</span> <span>${t.time}</span></div>
                    </div>
                `;
            });
        }

        loadTokenHistory();
    </script>
</body>
</html>
