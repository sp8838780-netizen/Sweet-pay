<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recharge History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 2px solid #000; font-weight: bold; color: #000; }
    </style>
</head>
<body class="bg-gray-50 p-4">

    <!-- Header के बैक बटन को फिक्स किया -->
    <div class="flex items-center mb-6">
        <!-- अब यह सीधा आपके डैशबोर्ड पर ले जाएगा -->
        <span onclick="window.location.href='dashboard.html'" class="text-2xl cursor-pointer font-bold">←</span>
        <h1 class="mx-auto font-bold text-lg">Recharge History</h1>
    </div>

    <!-- Tabs -->
    <div class="flex justify-between text-sm text-gray-500 mb-6 border-b pb-2">
        <button onclick="filterOrders('All')" id="tab-All" class="tab-active">All</button>
        <button onclick="filterOrders('Pending')" id="tab-Pending">Pending</button>
        <button onclick="filterOrders('Success')" id="tab-Success">Success</button>
        <button onclick="filterOrders('Timeout')" id="tab-Timeout">Timeout</button>
        <button onclick="filterOrders('Cancel')" id="tab-Cancel">Cancel</button>
    </div>

    <!-- Order List -->
    <div id="historyList" class="space-y-4"></div>

    <script>
        let allData = [];
        let currentTab = 'All';

        function mapStatusMatches(paymentStatus, tabLabel) {
            const s = String(paymentStatus || '').toUpperCase();
            if (tabLabel === 'All') return true;
            if (tabLabel === 'In Payment') return ['PENDING_APPROVAL', 'PENDING_APPROVAL'].includes(s);
            if (tabLabel === 'Success') return s === 'SUCCESS';
            if (tabLabel === 'Timeout') return s === 'TIMEOUT';
            if (tabLabel === 'Cancel') return s === 'CANCELLED' || s === 'CANCEL';
            return false;
        }

        async function loadHistory() {
            try {
                const response = await fetch('/api/my-payments', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                });
                const data = await response.json();
                allData = data.payments || [];
                filterOrders(currentTab);

                // Setup SSE for live updates
                try {
                    const token = encodeURIComponent(localStorage.getItem('token') || '');
                    let es = new EventSource('/api/stream?token=' + token);
                    let polling = false;
                    let pollIntervalId = null;

                    const startPolling = () => {
                        if (polling) return;
                        polling = true;
                        pollIntervalId = setInterval(async () => {
                            try {
                                const r = await fetch('/api/my-payments', { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') } });
                                const dd = await r.json();
                                const newList = dd.payments || [];
                                // merge by requestID
                                newList.forEach(p => {
                                    const idx = allData.findIndex(x => x.requestID === p.requestID);
                                    if (idx >= 0) allData[idx] = p;
                                    else allData.unshift(p);
                                });
                                filterOrders(currentTab);
                            } catch (e) { console.error('polling err', e); }
                        }, 5000);
                    };

                    const stopPolling = () => {
                        if (pollIntervalId) clearInterval(pollIntervalId);
                        polling = false;
                        pollIntervalId = null;
                    };

                    es.onmessage = (e) => {
                        try {
                            const msg = JSON.parse(e.data || '{}');
                            if (msg.type === 'payment_update' && msg.payment) {
                                const p = msg.payment;
                                const idx = allData.findIndex(x => x.requestID === p.requestID);
                                if (idx >= 0) allData[idx] = p;
                                else allData.unshift(p);
                                filterOrders(currentTab);
                            }
                        } catch (err) { console.error('SSE parse', err); }
                    };

                    es.onopen = () => {
                        stopPolling();
                    };

                    es.onerror = (err) => {
                        console.warn('SSE error, falling back to polling', err);
                        try { es.close(); } catch (e) {}
                        startPolling();
                    };

                    // cleanup on unload
                    window.addEventListener('beforeunload', () => {
                        try { es.close(); } catch (e) {}
                        stopPolling();
                    });
                } catch (err) { console.warn('Live updates unavailable', err); }
            } catch (err) {
                console.log("History load error: " + err);
            }
        }

        function filterOrders(status) {
            currentTab = status;
            document.querySelectorAll('button').forEach(b => b.classList.remove('tab-active'));
            // find button by text
            const btn = Array.from(document.querySelectorAll('button')).find(b => b.textContent.trim() === status);
            if (btn) btn.classList.add('tab-active');

            const list = document.getElementById('historyList');
            const filtered = allData.filter(o => mapStatusMatches(o.status, status));

            if (filtered.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-400 mt-10">No records found</p>';
                return;
            }

            list.innerHTML = filtered.map(o => `
                <div class="bg-white p-4 rounded-lg shadow-sm border">
                    <div class="flex justify-between items-center mb-2">
                        <div>
                            <span class="font-bold text-lg">${o.amount} RS</span>
                            <span class="ml-2 text-xs font-bold ${getColor(o.status)}">${String(o.status || '').toUpperCase()}</span>
                        </div>
                        ${o.utr ? `<span class="text-xs">UTR:${o.utr}</span>` : '<span class="text-xs text-gray-400">Waiting...</span>'}
                    </div>
                    <div class="flex text-xs text-gray-500">
                        <span class="mr-6">Income <br> <b>${(Number(o.amount || 0) * 0.04).toFixed(0)}</b></span>
                        <span>Quota <br> <b class="text-teal-600">+${(Number(o.amount || 0) * 1.04).toFixed(0)}</b></span>
                    </div>
                </div>
            `).join('');
        }

        function getColor(status) {
            const s = String(status || '').toUpperCase();
            if (s === 'SUCCESS') return 'text-teal-500';
            if (s === 'IN_PAYMENT' || s === 'PENDING_APPROVAL') return 'text-orange-500';
            if (s === 'CANCELLED' || s === 'CANCEL') return 'text-red-500';
            if (s === 'TIMEOUT') return 'text-purple-500';
            return 'text-gray-500';
        }

        window.onload = loadHistory;
    </script>
</body>
</html>
