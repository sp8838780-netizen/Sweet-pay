<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recharge History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 2px solid #000; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50 p-4">

    <!-- Header -->
    <div class="flex items-center mb-6">
        <span onclick="history.back()" class="text-xl cursor-pointer">←</span>
        <h1 class="mx-auto font-bold text-lg">Recharge History</h1>
    </div>

    <!-- Tabs -->
    <div class="flex justify-between text-sm text-gray-500 mb-6 border-b pb-2">
        <button onclick="filterOrders('All')" id="tab-All" class="tab-active">All</button>
        <button onclick="filterOrders('In Payment')" id="tab-In Payment">In Payment</button>
        <button onclick="filterOrders('Success')" id="tab-Success">Success</button>
        <button onclick="filterOrders('Timeout')" id="tab-Timeout">Timeout</button>
        <button onclick="filterOrders('Cancel')" id="tab-Cancel">Cancel</button>
    </div>

    <!-- Order List -->
    <div id="historyList" class="space-y-4"></div>

    <script>
        let history = JSON.parse(localStorage.getItem('rechargeHistory') || '[]');

        function filterOrders(status) {
            // टैब की स्टाइल बदलना
            document.querySelectorAll('button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + status).classList.add('tab-active');

            const list = document.getElementById('historyList');
            let filtered = (status === 'All') ? history : history.filter(o => o.status === status);

            list.innerHTML = filtered.map(o => `
                <div class="bg-white p-4 rounded-lg shadow-sm border ${o.status === 'In Payment' && !o.utr ? 'cursor-pointer' : ''}" 
                     onclick="${o.status === 'In Payment' && !o.utr ? `window.location.href='task-detail.html?amount=${o.amount}'` : ''}">
                    
                    <div class="flex justify-between items-center mb-2">
                        <div>
                            <span class="font-bold text-lg">${o.amount} RS</span>
                            <span class="ml-2 text-xs font-bold ${getColor(o.status)}">${o.status}</span>
                        </div>
                        ${o.utr ? `<span class="text-xs">UTR:${o.utr}</span>` : '<span class="text-xl">›</span>'}
                    </div>
                    
                    <div class="flex text-xs text-gray-500">
                        <span class="mr-6">Income <br> <b>${(o.amount * 0.04).toFixed(0)}</b></span>
                        <span>Quota <br> <b class="text-teal-600">+${(o.amount * 1.04).toFixed(0)}</b></span>
                    </div>
                </div>
            `).join('');
        }

        function getColor(status) {
            if (status === 'Success') return 'text-teal-500';
            if (status === 'In Payment') return 'text-orange-500';
            if (status === 'Cancel') return 'text-red-500';
            return 'text-gray-500';
        }

        filterOrders('All');
    </script>
</body>
</html>
