<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Randi Pay</title>
    <style>
        /* मोबाइल स्क्रीन पर फिक्स करने के लिए CSS */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden; /* साइड में स्क्रीन न हिले */
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
        }
        .form-container { 
            width: 100%; 
            max-width: 320px; /* मोबाइल साइज के लिए बेस्ट */
            padding: 20px; 
            background: white; 
            border-radius: 10px; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1); 
            text-align: center;
            box-sizing: border-box; /* ताकि पैडिंग से चौड़ाई न बढ़े */
        }
        .logo { width: 100px; margin-bottom: 20px; }
        input { width: 100%; margin: 10px 0; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .login-link { margin-top: 15px; display: block; color: #007bff; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="form-container">
    <img src="14320.jpg" alt="Randi Pay Logo" class="logo">
    
    <h2>Create Account</h2>
    <input type="text" id="mobile" placeholder="Mobile Number" required>
    <input type="password" id="pass" placeholder="Password" required>
    <input type="password" id="confirmPass" placeholder="Confirm Password" required>
    
    <input type="text" id="referral" placeholder="Referral Code" readonly>
    
    <button onclick="register()">Register</button>
    
    <a href="login.html" class="login-link">Already have an account? Login</a>
</div>

<script>
    // URL से कोड उठाना
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');

    window.onload = function() {
        document.getElementById('referral').value = code || "NONE";
    };

    async function register() {
        let mobile = document.getElementById('mobile').value;
        let pass = document.getElementById('pass').value;
        let confirmPass = document.getElementById('confirmPass').value;
        let referral = document.getElementById('referral').value;

        if (mobile.length !== 10) { alert("Please enter a valid 10-digit mobile number"); return; }
        if (pass !== confirmPass) { alert("Passwords do not match"); return; }

        try {
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mobile, pass, referral })
            });

            const data = await response.json();

            if (data.success) {
                localStorage.setItem('userID', data.userID);
                localStorage.setItem('myReferralCode', data.myReferralCode);
                alert("Registration Successful!\nYour New Unique ID: " + data.userID);
                window.location.href = "profile.html";
            } else {
                alert("Error: " + (data.message || "Registration failed."));
            }
        } catch (err) {
            alert("Server connection error. Try again later.");
        }
    }
</script>

</body>
</html>
